<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eaf8ff,#cfefff);
padding:40px;
min-height:100vh;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
}

.header{
background:#0b5ed7;
color:white;
padding:30px;
text-align:center;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
background:#0b5ed7;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

a{
display:block;
width:220px;
margin:30px auto;
text-align:center;
background:#0b5ed7;
color:white;
padding:12px;
border-radius:8px;
text-decoration:none;
}

a:hover{
background:#084298;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>📜 Donation History</h1>
<p>Completed food donations</p>
</div>

<table>

<th>Quantity</th>

</tr>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - Smart Food Connect</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eaf8ff,#cfefff);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* Floating Food Animation */
.food{
position:absolute;
font-size:35px;
opacity:.5;
animation:float linear infinite;
}

.food:nth-child(1){left:5%;animation-duration:8s;}
.food:nth-child(2){left:15%;animation-duration:10s;}
.food:nth-child(3){left:25%;animation-duration:9s;}
.food:nth-child(4){left:35%;animation-duration:11s;}
.food:nth-child(5){left:45%;animation-duration:8s;}
.food:nth-child(6){left:55%;animation-duration:12s;}
.food:nth-child(7){left:65%;animation-duration:10s;}
.food:nth-child(8){left:75%;animation-duration:9s;}
.food:nth-child(9){left:85%;animation-duration:13s;}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
50%{
opacity:.7;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* Main Box */
.container{
width:800px;
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
position:relative;
text-align:center;
z-index:1;
}

/* Logout Button */
.logout{
position:absolute;
top:20px;
right:20px;
background:#0b5ed7;
color:white;
padding:10px 18px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.logout:hover{
background:#084298;
transform:scale(1.05);
}

/* Thank You Animation */
.icon{
font-size:80px;
margin-bottom:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

h1{
color:#0b5ed7;
font-size:40px;
margin-bottom:20px;
}

p{
font-size:18px;
color:#444;
line-height:30px;
margin-bottom:20px;
}

/* Heart Animation */
.heart{
font-size:40px;
color:red;
animation:heartBeat 1s infinite;
}

@keyframes heartBeat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- Background animations -->
<div class="food">🍎</div>
<div class="food">🥗</div>
<div class="food">🥕</div>
<div class="food">🍞</div>
<div class="food">🥛</div>
<div class="food">🍚</div>
<div class="food">🌾</div>
<div class="food">🌶️</div>
<div class="food">🍅</div>

<div class="container">

<a href="login_register.html" class="logout">
Logout 🚪
</a>

<div class="icon">
🙏
</div>

<h1>Thank You For Your Feedback!</h1>

<p>
Your feedback helps us improve <b>Smart Food Connect</b> and continue reducing food waste efficiently.
</p>

<p>
We appreciate your support and contribution.
</p>

<div class="heart">
❤️
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation Accepted</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eaf8ff,#cfefff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Floating Food Animation */

.food{
position:absolute;
font-size:35px;
opacity:.5;
animation:float linear infinite;
}

.food:nth-child(1){left:5%;animation-duration:8s;}
.food:nth-child(2){left:15%;animation-duration:10s;}
.food:nth-child(3){left:25%;animation-duration:9s;}
.food:nth-child(4){left:35%;animation-duration:11s;}
.food:nth-child(5){left:45%;animation-duration:8s;}
.food:nth-child(6){left:55%;animation-duration:12s;}
.food:nth-child(7){left:65%;animation-duration:10s;}
.food:nth-child(8){left:75%;animation-duration:9s;}
.food:nth-child(9){left:85%;animation-duration:13s;}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
50%{
opacity:.7;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* Main Box */

.container{
width:850px;
background:white;
padding:50px;
border-radius:30px;
text-align:center;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.2);
z-index:1;
}

/* Top Buttons */

.top-buttons{
position:absolute;
top:20px;
right:20px;
display:flex;
gap:10px;
}

.btn{
background:#0b5ed7;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#084298;
transform:scale(1.05);
}

/* Animation */

.accept-icon{
font-size:80px;
margin-bottom:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.hand{
font-size:45px;
margin-top:20px;
animation:moveHand 1.5s infinite;
}

@keyframes moveHand{
0%{transform:translateX(0);}
50%{transform:translateX(15px);}
100%{transform:translateX(0);}
}

h1{
color:#0b5ed7;
font-size:40px;
margin-bottom:20px;
}

p{
font-size:18px;
color:#444;
line-height:30px;
}

</style>

</head>
<body>

<div class="food">🍎</div>
<div class="food">🥗</div>
<div class="food">🥕</div>
<div class="food">🍞</div>
<div class="food">🥛</div>
<div class="food">🍚</div>
<div class="food">🌾</div>
<div class="food">🌶️</div>
<div class="food">🍅</div>

<div class="container">

<div class="top-buttons">

<a href="ngo_dashboard.html" class="btn">
NGO Dashboard
</a>

<a href="contact_us.html" class="btn">
Contact
</a>

<a href="login_register.html" class="btn">
Logout 🚪
</a>

</div>
<div class="accept-icon">
🤝🍱
</div>

<h1>You Have Accepted The Donation!</h1>

<p>
Thank you for helping reduce food waste and supporting people in need.
</p>

<p>
The donation request has been successfully assigned to your NGO.
</p>

<br><br>

<a href="ngo_dashboard.html" class="btn">
Go to NGO Dashboard →
</a>
</div>

</body>
</html>
